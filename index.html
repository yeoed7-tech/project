<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>신랑 여은동 & 신부 엄다혜의 모바일 청첩장</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* 기본 스타일 리셋 및 모바일 레이아웃 최적화 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
        }
        
        /* 모바일 청첩장 컨테이너 */
        .wrapper {
            width: 100%;
            max-width: 480px;
            background-color: #fdfbf7;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding-bottom: 60px;
        }

        section {
            padding: 60px 20px;
            text-align: center;
        }

        .serif {
            font-family: 'Gowun Batang', serif;
        }

        /* 1. 배경음악(BGM) 플로팅 버튼 */
        .bgm-controller {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e0dcd5;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 2. 메인 커버 섹션 */
        .cover-section {
            padding: 0;
            position: relative;
            background-color: #000;
        }
        .main-video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        .cover-info {
            padding: 40px 20px;
            background-color: #fdfbf7;
        }
        .cover-title {
            font-size: 18px;
            letter-spacing: 4px;
            color: #8a7b6e;
            margin-bottom: 15px;
        }
        .cover-names {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #4a423a;
        }
        .cover-date {
            font-size: 14px;
            letter-spacing: 1px;
            color: #7a7065;
        }

        /* 3. 초대글 섹션 */
        .greeting-section {
            background-color: #fff;
            border-top: 1px solid #f4f0ea;
        }
        .section-title {
            font-size: 14px;
            letter-spacing: 3px;
            color: #9e8a78;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .greeting-text {
            font-size: 15px;
            color: #555;
            margin-bottom: 40px;
            line-height: 2.2;
        }
        .relations {
            font-size: 15px;
            color: #4a423a;
            line-height: 2;
        }
        .relations span {
            color: #8a7b6e;
            font-size: 13px;
            margin: 0 5px;
        }

        /* 4. 갤러리 슬라이더 섹션 (스와이프 및 드래그 최적화) */
        .gallery-section {
            background-color: #fff;
            overflow: hidden;
            position: relative;
        }
        .slider-container {
            width: 100%;
            position: relative;
            overflow: hidden;
            touch-action: pan-y;
            user-select: none;
        }
        .slider-wrapper {
            display: flex;
            transition: transform 0.3s ease-out;
            cursor: grab;
        }
        .slider-wrapper:active {
            cursor: grabbing;
        }
        .slide {
            flex: 0 0 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide img {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            pointer-events: none; /* 드래그 중 이미지 자체 선택 방지 */
        }

        /* 슬라이드 화살표 버튼 */
        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #e0dcd5;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: #6e5f52;
            z-index: 10;
            transition: background 0.2s;
        }
        .slide-btn:hover {
            background: rgba(255, 255, 255, 0.9);
        }
        .slide-btn.prev { left: 10px; }
        .slide-btn.next { right: 10px; }

        /* 인디케이터 (페이지 번호 점) */
        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #eaddcf;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .dot.active {
            background-color: #8a7b6e;
        }
        
        /* 5. 오시는 길 섹션 */
        .map-section {
            background-color: #fff;
        }
        .venue-info {
            margin-bottom: 20px;
        }
        .venue-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .venue-address {
            font-size: 14px;
            color: #666;
        }
        .mock-map {
            width: 100%;
            height: 250px;
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .map-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .map-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0dcd5;
            background: #fff;
            border-radius: 6px;
            font-size: 13px;
            text-decoration: none;
            color: #555;
        }

        /* 6. 마음 전하실 곳 */
        .account-section {
            background-color: #fdfbf7;
        }
        .account-btn {
            width: 100%;
            padding: 15px;
            background-color: #f9f7f3;
            border: 1px solid #eaddcf;
            color: #6e5f52;
            font-size: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .account-content {
            display: none;
            background: #fff;
            padding: 15px;
            border: 1px solid #eaddcf;
            border-top: none;
            margin-top: -10px;
            margin-bottom: 15px;
            border-radius: 0 0 6px 6px;
            text-align: left;
        }
        .account-content.active {
            display: block;
        }
        .account-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
            font-size: 14px;
        }
        .account-row:last-child { border-bottom: none; }
        .copy-btn {
            background-color: #8a7b6e;
            color: #fff;
            border: none;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <!-- 오디오 태그 및 컨트롤러 -->
        <audio id="weddingBgm" loop>
            <source src="bgm.mp3" type="audio/mpeg">
        </audio>
        <div id="bgmToggle" class="bgm-controller">
            <span>🎵</span> <span id="bgmText">BGM 재생</span>
        </div>

        <!-- 메인 커버 섹션 -->
        <section class="cover-section">
            <video autoplay loop muted playsinline class="main-video" poster="JS_00049.jpg">
                <source src="wedding_movie.mp4" type="video/mp4">
            </video>
            
            <div class="cover-info">
                <div class="cover-title serif">WEDDING DAY</div>
                <div class="cover-names serif">여은동 & 엄다혜</div>
                <div class="cover-date">2026년 10월 17일 토요일 오후 4시 20분</div>
            </div>
        </section>

        <!-- 초대글 섹션 -->
        <section class="greeting-section">
            <div class="section-title serif">INVITATION</div>
            <div class="greeting-text serif">
                서로가 마주 보며 다져온 사랑을<br>
                이제 함께 하나의 길을 걷는 정으로 가꾸고자 합니다.<br>
                저희의 뜻깊은 출발의 자리에 오셔서<br>
                따뜻한 격려로 축복해 주시면 감사하겠습니다.
            </div>
            <div class="relations serif">
                여정웅 · 김명숙 <span class="relation-type">의 장남</span> 은동<br>
                엄태호 · 최영희 <span class="relation-type">의 장녀</span> 다혜
            </div>
        </section>

        <!-- 갤러리 슬라이더 섹션 (수정된 영역) -->
        <section class="gallery-section">
            <div class="section-title serif">GALLERY</div>
            
            <div class="slider-container" id="sliderContainer">
                <!-- 좌우 화살표 버튼 -->
                <button class="slide-btn prev" id="prevBtn">◀</button>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>신랑 여은동 & 신부 엄다혜의 모바일 청첩장</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f5f5; color: #333; line-height: 1.6; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; background-color: #fdfbf7; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); padding-bottom: 60px; }
        section { padding: 60px 20px; text-align: center; }
        .serif { font-family: 'Gowun Batang', serif; }

        /* BGM 버튼 */
        .bgm-controller { position: fixed; top: 20px; right: 20px; z-index: 1000; background: rgba(255, 255, 255, 0.8); border: 1px solid #e0dcd5; padding: 8px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* 메인 커버 (이미지로 변경됨) */
        .cover-section { padding: 0; position: relative; }
        .main-image { width: 100%; height: auto; display: block; object-fit: cover; }
        .cover-info { padding: 40px 20px; background-color: #fdfbf7; }
        .cover-title { font-size: 18px; letter-spacing: 4px; color: #8a7b6e; margin-bottom: 15px; }
        .cover-names { font-size: 24px; font-weight: 700; margin-bottom: 15px; color: #4a423a; }
        .cover-date { font-size: 14px; letter-spacing: 1px; color: #7a7065; }

        /* 갤러리 그리드 */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px 0; }
        .gallery-item { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; cursor: pointer; border-radius: 4px; }

        /* 슬라이드 모달 */
        .gallery-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; touch-action: none; }
        .gallery-modal.show { display: flex; }
        .slider-container { width: 100%; overflow: hidden; position: relative; }
        .slider-wrapper { display: flex; transition: transform 0.3s ease-out; }
        .slide { flex: 0 0 100%; display: flex; justify-content: center; align-items: center; }
        .modal-content { max-width: 95%; max-height: 80vh; object-fit: contain; pointer-events: none; }
        
        .modal-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 30px; background: none; border: none; z-index: 2100; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; border: none; padding: 15px 10px; font-size: 20px; z-index: 2100; }
        .nav-btn.prev { left: 10px; }
        .nav-btn.next { right: 10px; }
        .slide-counter { position: absolute; bottom: 20px; color: white; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 12px; z-index: 2100; }

        /* 계좌 아코디언 */
        .account-btn { width: 100%; padding: 15px; background: #f9f7f3; border: 1px solid #eaddcf; color: #6e5f52; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; cursor: pointer; }
        .account-content { display: none; background: #fff; padding: 15px; border: 1px solid #eaddcf; border-top: none; margin-top: -10px; margin-bottom: 15px; border-radius: 0 0 6px 6px; }
        .account-content.active { display: block; }
        .copy-btn { background: #8a7b6e; color: #fff; border: none; padding: 4px 8px; font-size: 11px; border-radius: 4px; cursor: pointer; }
    </style>
</head>


    <body>
    <div class="wrapper">
        <audio id="weddingBgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
        <div id="bgmToggle" class="bgm-controller"><span>🎵</span> <span id="bgmText">BGM 재생</span></div>

        <!-- 메인 커버: 이미지로 교체 완료 -->
        <section class="cover-section">
            <img src="JS_00049.jpg" alt="메인 사진" class="main-image">
            <div class="cover-info">
                <div class="cover-title serif">WEDDING DAY</div>
                <div class="cover-names serif">여은동 & 엄다혜</div>
                <div class="cover-date">2026년 10월 17일 토요일 오후 4시 20분</div>
            </div>
        </section>

        <!-- 초대글 -->
        <section class="greeting-section">
            <div class="section-title serif">INVITATION</div>
            <div class="greeting-text serif">저희 두 사람이 사랑으로 만나<br>진실한 가정을 이루고자 합니다.<br>귀한 걸음 하시어 축복해 주시면 감사하겠습니다.</div>
            <div class="relations serif">여정웅·김명숙의 장남 은동<br>엄태호·최영희의 장녀 다혜</div>
        </section>

        <!-- 갤러리 그리드 -->
        <section class="gallery-section">
            <div class="section-title serif">GALLERY</div>
            <div class="gallery-grid">
                <img src="20260520_202729.jpg" class="gallery-item" onclick="openModal(0)">
                <img src="1779281556121.jpg" class="gallery-item" onclick="openModal(1)">
                <img src="1779281778836.jpg" class="gallery-item" onclick="openModal(2)">
                <img src="1779281815677.jpg" class="gallery-item" onclick="openModal(3)">
                <img src="1782059394449.jpg" class="gallery-item" onclick="openModal(4)">
                <img src="1782059400422.jpg" class="gallery-item" onclick="openModal(5)">
                <img src="JS_00016.JPG" class="gallery-item" onclick="openModal(6)">
                <img src="JS_00049(main).JPG" class="gallery-item" onclick="openModal(7)">
                <img src="JS_00311.JPG" class="gallery-item" onclick="openModal(8)">
                <img src="JS_00332.JPG" class="gallery-item" onclick="openModal(9)">
                <img src="JS_00376.JPG" class="gallery-item" onclick="openModal(10)">
                <img src="JS_00415.JPG" class="gallery-item" onclick="openModal(11)">
                <img src="JS_00443.JPG" class="gallery-item" onclick="openModal(12)">
                <img src="JS_00553.JPG" class="gallery-item" onclick="openModal(13)">
                <img src="JS_01068.JPG" class="gallery-item" onclick="openModal(14)">
                <img src="JS_01155.JPG" class="gallery-item" onclick="openModal(15)">
                <img src="JS_01215.JPG" class="gallery-item" onclick="openModal(16)">
                <img src="JS_01222.JPG" class="gallery-item" onclick="openModal(17)">
                <img src="JS_01318.JPG" class="gallery-item" onclick="openModal(18)">
                <img src="Screenshot_20260621_155215_Gallery.jpg" class="gallery-item" onclick="openModal(19)">
            </div>
        </section>

        <!-- 계좌 정보 -->
        <section class="account-section">
            <div class="section-title serif">마음 전하실 곳</div>
            <button class="account-btn" onclick="toggleAccount('groomAcc')">신랑측 계좌 <span>▼</span></button>
            <div id="groomAcc" class="account-content">국민 123-456-789 (여은동) <button class="copy-btn" onclick="copyText('123456789')">복사</button></div>
            <button class="account-btn" onclick="toggleAccount('brideAcc')">신부측 계좌 <span>▼</span></button>
            <div id="brideAcc" class="account-content">신한 987-654-321 (엄다혜) <button class="copy-btn" onclick="copyText('987654321')">복사</button></div>
        </section>
    </div>

    <!-- 모달 레이아웃 -->
    <div id="galleryModal" class="gallery-modal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>
        <div class="slider-container">
            <div id="sliderWrapper" class="slider-wrapper"></div>
        </div>
        <div id="slideCounter" class="slide-counter">1 / 1</div>
    </div>


            <script>
        // BGM 및 계좌 기능
        const bgm = document.getElementById('weddingBgm');
        document.getElementById('bgmToggle').onclick = () => {
            if(bgm.paused) { bgm.play(); document.getElementById('bgmText').innerText="BGM 정지"; }
            else { bgm.pause(); document.getElementById('bgmText').innerText="BGM 재생"; }
        };
        function toggleAccount(id) { document.getElementById(id).classList.toggle('active'); }
        function copyText(val) { navigator.clipboard.writeText(val); alert("복사되었습니다."); }

        // 슬라이더 기능
        const modal = document.getElementById('galleryModal'), wrapper = document.getElementById('sliderWrapper'), counter = document.getElementById('slideCounter'), items = document.querySelectorAll('.gallery-item');
        let currentIndex = 0, startX = 0, currentT = 0, prevT = 0, isDragging = false;

        function openModal(idx) {
            currentIndex = idx;
            wrapper.innerHTML = '';
            items.forEach(img => {
                const s = document.createElement('div'); s.className='slide';
                const i = document.createElement('img'); i.src=img.src; i.className='modal-content';
                s.appendChild(i); wrapper.appendChild(s);
            });
            modal.classList.add('show');
            updatePos();
        }
        function closeModal() { modal.classList.remove('show'); }
        function moveSlide(d) {
            currentIndex = Math.max(0, Math.min(items.length - 1, currentIndex + d));
            updatePos();
        }
        function updatePos() {
            currentT = currentIndex * -wrapper.clientWidth;
            prevT = currentT;
            wrapper.style.transform = `translateX(${currentT}px)`;
            counter.innerText = `${currentIndex + 1} / ${items.length}`;
        }

        // 드래그 제어
        wrapper.onmousedown = wrapper.ontouchstart = (e) => {
            isDragging = true; startX = e.type.includes('touch') ? e.touches[0].clientX : e.pageX;
            wrapper.style.transition = 'none';
        };
        window.onmousemove = window.ontouchmove = (e) => {
            if(!isDragging) return;
            const x = e.type.includes('touch') ? e.touches[0].clientX : e.pageX;
            wrapper.style.transform = `translateX(${prevT + (x - startX)}px)`;
        };
        window.onmouseup = window.ontouchend = (e) => {
            if(!isDragging) return;
            isDragging = false; wrapper.style.transition = 'transform 0.3s';
            const x = e.type.includes('touch') ? e.changedTouches[0].clientX : e.pageX;
            if(startX - x > 50) moveSlide(1);
            else if(x - startX > 50) moveSlide(-1);
            else updatePos();
        };
    </script>
</body>
</html>
